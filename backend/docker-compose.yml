version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jumpstart
    ports:
      - "5432:5432"
    volumes:
      - jumpstart_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: "*"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in backend/.env — see .env.example}
      DATABASE_URL: ${DATABASE_URL:-}
      EMAIL_USER: ${EMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      GITHUB_MODELS_TOKEN: ${GITHUB_MODELS_TOKEN:-}
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: jumpstart
    ports:
      - "4000:4000"

volumes:
  jumpstart_pgdata:
