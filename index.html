<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JumpStart — Обяви за работа</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Source+Serif+4:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#16233F;
    --navy-light:#1F3358;
    --coral:#E8622C;
    --coral-dark:#C74E1E;
    --coral-light:#FBE6DB;
    --cream:#F7F5F0;
    --paper:#FFFFFF;
    --line:#E4E0D6;
    --line-strong:#CFC9B8;
    --ink:#1C1B17;
    --ink-soft:#5B5A52;
    --ink-mute:#8C8A7E;
    --green:#2E7D4F;
    --green-bg:#E7F3EB;
    --accent:var(--navy);
    --coral-text:var(--coral-text);
    --radius:10px;
    --shadow:0 1px 2px rgba(28,27,23,0.06);
    --shadow-md:0 4px 16px rgba(22,35,63,0.08);
    --shadow-lg:0 16px 48px rgba(22,35,63,0.18);
  }
  html[data-theme="dark"]{
    --coral-light:rgba(232,98,44,0.16);
    --coral-text:#FF9C6B;
    --cream:#101218;
    --paper:#1B1E27;
    --line:#2B2F3B;
    --line-strong:#3D4250;
    --ink:#EDEDEA;
    --ink-soft:#B8B6AE;
    --ink-mute:#84827A;
    --green:#4ADE94;
    --green-bg:rgba(46,125,79,0.2);
    --accent:#7C93FF;
    --shadow:0 1px 2px rgba(0,0,0,0.4);
    --shadow-md:0 4px 16px rgba(0,0,0,0.45);
    --shadow-lg:0 16px 48px rgba(0,0,0,0.6);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  *{transition:background-color .25s ease,border-color .25s ease,color .25s ease;}
  body{
    font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--cream);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{font-weight:700;letter-spacing:-0.01em;}
  .brand-font{font-family:'Source Serif 4',serif;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  input,select,textarea{font-family:inherit;}
  ::selection{background:var(--coral-light);color:var(--coral-text);}

  .container{max-width:1180px;margin:0 auto;padding:0 24px;}

  /* ===== HEADER ===== */
  .site-header{
    background:var(--navy);
    position:sticky;top:0;z-index:100;
    box-shadow:0 1px 0 rgba(0,0,0,0.15);
  }
  .header-top{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 0;
  }
  .logo{
    display:flex;align-items:center;gap:10px;
    font-size:22px;font-weight:800;color:#fff;
  }
  .logo-mark{
    width:38px;height:44px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .logo-mark img{width:100%;height:100%;display:block;object-fit:contain;}
  .logo .logo-mark{width:58px;height:68px;}
  .logo{gap:14px;}
  nav.main-nav{display:flex;gap:28px;align-items:center;}
  .nav-link{
    color:rgba(255,255,255,0.72);
    font-size:14.5px;font-weight:600;
    transition:color .15s;
    white-space:nowrap;
  }
  .nav-link:hover{color:#fff;}
  .header-actions{display:flex;gap:10px;align-items:center;}
  .btn{
    padding:9px 18px;border-radius:8px;
    font-size:14px;font-weight:700;
    transition:all .15s;
    display:inline-flex;align-items:center;gap:6px;
    white-space:nowrap;
  }
  .btn-coral{background:var(--coral);color:#fff;}
  .btn-coral:hover{background:var(--coral-dark);}
  .btn-ghost-light{color:#fff;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);}
  .btn-ghost-light:hover{background:rgba(255,255,255,0.16);}
  .btn-outline{border:1.5px solid var(--line-strong);color:var(--ink);background:var(--paper);}
  .btn-outline:hover{border-color:var(--navy);background:var(--cream);}
  .btn-navy{background:var(--navy);color:#fff;}
  .btn-navy:hover{background:var(--navy-light);}
  .btn-sm{padding:6px 13px;font-size:13px;}
  .btn-full{width:100%;justify-content:center;}
  .btn-lg{padding:14px 28px;font-size:15.5px;}
  .btn:disabled{opacity:0.55;cursor:not-allowed;}

  .user-chip{
    display:flex;align-items:center;gap:8px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    padding:6px 14px 6px 6px;border-radius:999px;
    color:#fff;font-size:13.5px;font-weight:600;
  }
  .user-avatar{
    width:26px;height:26px;border-radius:50%;
    background:var(--coral);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:800;flex-shrink:0;
  }

  .theme-toggle{
    width:38px;height:38px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    color:#fff;
    transition:background .15s,transform .15s;
  }
  .theme-toggle:hover{background:rgba(255,255,255,0.16);}
  .theme-toggle:active{transform:scale(0.85);}
  .theme-toggle-icon{display:flex;animation:themeIconPop .45s cubic-bezier(.34,1.56,.64,1);}
  @keyframes themeIconPop{
    0%{transform:rotate(-95deg) scale(0.3);opacity:0;}
    60%{transform:rotate(10deg) scale(1.2);opacity:1;}
    100%{transform:rotate(0) scale(1);opacity:1;}
  }

  /* ===== HERO ===== */
  .hero{
    background:linear-gradient(180deg,var(--navy) 0%,var(--navy-light) 100%);
    padding:56px 0 90px;
    position:relative;
    overflow:hidden;
  }
  .hero::after{
    content:'';position:absolute;right:-80px;top:-40px;
    width:420px;height:420px;border-radius:50%;
    background:radial-gradient(circle,rgba(232,98,44,0.14) 0%,transparent 70%);
  }
  .hero-inner{position:relative;z-index:1;}
  .hero-eyebrow{
    color:var(--coral);font-size:13px;font-weight:800;
    letter-spacing:0.08em;text-transform:uppercase;
    margin-bottom:14px;display:flex;align-items:center;gap:8px;
  }
  .hero-eyebrow::before{content:'';width:20px;height:2px;background:var(--coral);}
  .hero h1{
    color:#fff;font-size:42px;line-height:1.15;
    max-width:640px;margin-bottom:14px;
  }
  .hero-sub{
    color:rgba(255,255,255,0.68);font-size:16.5px;
    max-width:520px;margin-bottom:34px;
  }
  .search-panel{
    background:var(--paper);
    border-radius:14px;
    padding:10px;
    box-shadow:var(--shadow-lg);
    display:grid;
    grid-template-columns:1.4fr 1fr auto;
    gap:8px;
    max-width:820px;
  }
  .search-field{
    display:flex;align-items:center;gap:10px;
    padding:11px 14px;border-radius:9px;
    border:1.5px solid transparent;
    transition:border-color .15s;
  }
  .search-field:focus-within{border-color:var(--line-strong);background:var(--cream);}
  .search-field svg{flex-shrink:0;color:var(--ink-mute);}
  .search-field input,.search-field select{
    border:none;outline:none;background:none;
    width:100%;font-size:15px;color:var(--ink);
  }
  .search-field select{cursor:pointer;}
  .search-divider{width:1px;background:var(--line);align-self:center;height:28px;}

  /* ===== CITY SEARCH SELECT ===== */
  .city-select{position:relative;}
  .search-field .city-select{flex:1;min-width:0;}
  .city-select-dropdown{
    position:absolute;top:calc(100% + 6px);left:0;right:0;
    background:var(--paper);border:1px solid var(--line);border-radius:10px;
    box-shadow:var(--shadow-lg);max-height:260px;overflow-y:auto;
    z-index:50;padding:6px;
  }
  .city-select-option{padding:9px 12px;border-radius:7px;font-size:14px;color:var(--ink);cursor:pointer;}
  .city-select-option:hover{background:var(--cream);}
  .city-select-option.active{background:var(--coral-light);color:var(--coral-text);font-weight:700;}
  .city-select-empty{padding:9px 12px;font-size:13px;color:var(--ink-mute);}

  .hero-stats{
    display:flex;gap:36px;margin-top:30px;
  }
  .hero-stat-num{color:#fff;font-size:24px;font-weight:800;}
  .hero-stat-label{color:rgba(255,255,255,0.55);font-size:13px;margin-top:2px;}

  .chip-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:22px;}
  .quick-chip{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.16);
    color:rgba(255,255,255,0.82);
    padding:7px 14px;border-radius:999px;
    font-size:13px;font-weight:600;
    transition:all .15s;
  }
  .quick-chip:hover{background:rgba(255,255,255,0.16);color:#fff;}

  /* ===== SECTIONS ===== */
  .section{padding:56px 0;}
  .section-head{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:26px;flex-wrap:wrap;gap:10px;
  }
  .section-head h2{font-size:25px;}
  .section-head .see-all{
    font-size:13.5px;font-weight:700;color:var(--coral);
    display:flex;align-items:center;gap:4px;
  }

  .cat-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:14px;
  }
  .cat-card{
    background:var(--paper);border:1px solid var(--line);
    border-radius:12px;padding:20px;
    transition:all .15s;
  }
  .cat-card:hover{border-color:var(--coral);box-shadow:var(--shadow-md);transform:translateY(-2px);}
  .cat-icon{
    width:42px;height:42px;border-radius:10px;
    background:var(--coral-light);color:var(--coral-text);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:14px;
  }
  .cat-card h4{font-size:15.5px;margin-bottom:4px;}
  .cat-card p{font-size:13px;color:var(--ink-mute);}

  /* ===== JOB LIST ===== */
  .job-layout{display:grid;grid-template-columns:260px 1fr;gap:28px;align-items:start;}
  .filters-box{
    background:var(--paper);border:1px solid var(--line);
    border-radius:12px;padding:20px;
    position:sticky;top:104px;
  }
  .filters-box h4{font-size:14px;margin-bottom:14px;}
  .filter-group{margin-bottom:20px;}
  .filter-group:last-child{margin-bottom:0;}
  .filter-group label{
    font-size:12.5px;font-weight:700;color:var(--ink-soft);
    text-transform:uppercase;letter-spacing:0.03em;
    display:block;margin-bottom:8px;
  }
  .filter-select{
    width:100%;padding:9px 11px;border:1.5px solid var(--line);
    border-radius:8px;font-size:13.5px;background:var(--paper);
    color:var(--ink);
  }
  .filter-select:focus{outline:none;border-color:var(--accent);}
  .checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:13.5px;color:var(--ink-soft);}
  .checkbox-row input{width:16px;height:16px;accent-color:var(--coral);}

  .job-list{display:flex;flex-direction:column;gap:12px;}
  .job-card{
    background:var(--paper);border:1px solid var(--line);
    border-radius:12px;padding:20px 22px;
    display:flex;gap:16px;align-items:flex-start;
    transition:all .15s;cursor:pointer;
  }
  .job-card:hover{border-color:var(--line-strong);box-shadow:var(--shadow-md);}
  .job-logo{
    width:52px;height:52px;border-radius:10px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:17px;color:#fff;
  }
  .job-main{flex:1;min-width:0;}
  .job-top-row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;}
  .job-title{font-size:16.5px;font-weight:700;margin-bottom:3px;}
  .job-title:hover{color:var(--coral-text);}
  .job-company{font-size:13.5px;color:var(--ink-soft);font-weight:600;}
  .job-meta-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:11px;}
  .job-meta-item{
    display:flex;align-items:center;gap:5px;
    font-size:12.5px;color:var(--ink-mute);font-weight:600;
  }
  .job-tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;}
  .tag{
    padding:4px 10px;border-radius:6px;font-size:11.5px;font-weight:700;
  }
  .tag-type{background:var(--green-bg);color:var(--green);}
  .tag-remote{background:#E8EEFB;color:#2451A3;}
  .tag-new{background:var(--coral-light);color:var(--coral-text);}
  .job-salary{
    font-size:14.5px;font-weight:800;color:var(--accent);
    white-space:nowrap;text-align:right;
  }
  .job-salary-label{font-size:11px;color:var(--ink-mute);font-weight:600;margin-top:2px;}
  .save-btn{
    width:34px;height:34px;border-radius:8px;
    border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    color:var(--ink-mute);flex-shrink:0;
    transition:all .15s;
  }
  .save-btn:hover{border-color:var(--coral);color:var(--coral);}
  .save-btn.saved{background:var(--coral-light);border-color:var(--coral);color:var(--coral-text);}

  .empty-state{
    text-align:center;padding:60px 20px;
    background:var(--paper);border:1px dashed var(--line-strong);border-radius:12px;
  }
  .empty-state svg{color:var(--ink-mute);margin-bottom:14px;}
  .empty-state h4{font-size:16px;margin-bottom:6px;}
  .empty-state p{font-size:13.5px;color:var(--ink-mute);margin-bottom:18px;}

  /* ===== EMPLOYERS STRIP ===== */
  .employers-strip{background:var(--paper);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:30px 0;}
  .strip-label{font-size:12px;font-weight:700;color:var(--ink-mute);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:16px;text-align:center;}
  .logo-strip{display:flex;justify-content:center;gap:44px;flex-wrap:wrap;align-items:center;}
  .strip-logo{font-family:'Source Serif 4',serif;font-weight:600;font-size:19px;color:var(--ink-mute);opacity:0.7;}

  /* ===== CTA BAND ===== */
  .cta-band{
    background:var(--navy);border-radius:16px;
    padding:44px 48px;
    display:flex;justify-content:space-between;align-items:center;gap:24px;
    margin:8px 0 0;
  }
  .cta-band h3{color:#fff;font-size:23px;margin-bottom:6px;}
  .cta-band p{color:rgba(255,255,255,0.62);font-size:14.5px;max-width:420px;}
  .cta-band-actions{display:flex;gap:10px;flex-shrink:0;}

  /* ===== FOOTER ===== */
  footer{background:var(--navy);color:rgba(255,255,255,0.6);padding:48px 0 24px;margin-top:60px;}
  .footer-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:32px;margin-bottom:36px;}
  .footer-logo{color:#fff;font-size:19px;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .footer-col h5{color:#fff;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:14px;}
  .footer-col a{display:block;font-size:13.5px;color:rgba(255,255,255,0.55);margin-bottom:10px;transition:color .15s;}
  .footer-col a:hover{color:#fff;}
  .footer-bottom{border-top:1px solid rgba(255,255,255,0.12);padding-top:20px;display:flex;justify-content:space-between;font-size:12.5px;color:rgba(255,255,255,0.4);flex-wrap:wrap;gap:8px;}

  /* ===== MODAL ===== */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(22,35,63,0.55);
    display:flex;align-items:center;justify-content:center;
    z-index:1000;padding:20px;
    animation:fadeIn .15s ease;
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .modal-box{
    background:var(--paper);border-radius:16px;
    width:100%;max-width:440px;
    max-height:90vh;overflow-y:auto;
    box-shadow:var(--shadow-lg);
    animation:slideUp .2s ease;
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .modal-header{
    padding:24px 26px 0;display:flex;justify-content:space-between;align-items:flex-start;
  }
  .modal-close{
    width:30px;height:30px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    color:var(--ink-mute);flex-shrink:0;
  }
  .modal-close:hover{background:var(--cream);color:var(--ink);}
  .modal-body{padding:14px 26px 26px;}
  .modal-title{font-size:21px;margin-bottom:4px;}
  .modal-sub{font-size:13.5px;color:var(--ink-mute);margin-bottom:22px;}

  .form-group{margin-bottom:15px;}
  .form-group label{
    display:block;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:6px;
  }
  .form-input{
    width:100%;padding:11px 13px;border:1.5px solid var(--line);
    border-radius:8px;font-size:14.5px;color:var(--ink);
    transition:border-color .15s;background:var(--paper);
  }
  .form-input:focus{outline:none;border-color:var(--accent);}
  .form-input.err{border-color:#C0392B;}
  .form-err-msg{font-size:12px;color:#C0392B;margin-top:5px;font-weight:600;}
  .form-hint{font-size:12px;color:var(--ink-mute);margin-top:5px;}

  .role-toggle{display:flex;gap:8px;margin-bottom:18px;}
  .role-opt{
    flex:1;padding:12px;border:1.5px solid var(--line);border-radius:9px;
    text-align:center;transition:all .15s;
  }
  .role-opt.active{border-color:var(--navy);background:var(--navy);color:#fff;}
  .role-opt svg{margin-bottom:5px;}
  .role-opt span{display:block;font-size:13px;font-weight:700;}

  .modal-switch{
    text-align:center;font-size:13.5px;color:var(--ink-mute);margin-top:18px;
    padding-top:16px;border-top:1px solid var(--line);
  }
  .modal-switch button{color:var(--coral);font-weight:700;}

  .success-box{text-align:center;padding:10px 0 6px;}
  .success-icon{
    width:60px;height:60px;border-radius:50%;background:var(--green-bg);
    display:flex;align-items:center;justify-content:center;color:var(--green);
    margin:0 auto 18px;
  }

  /* ===== JOB DETAIL MODAL ===== */
  .detail-modal{max-width:640px;}
  .detail-header{
    padding:28px 30px;background:var(--cream);
    border-radius:16px 16px 0 0;
    display:flex;gap:16px;align-items:flex-start;
  }
  .detail-body{padding:26px 30px 30px;}
  .detail-body h4{font-size:15px;margin:22px 0 10px;}
  .detail-body h4:first-child{margin-top:0;}
  .detail-body p{font-size:14.5px;color:var(--ink-soft);line-height:1.7;}
  .detail-body ul{padding-left:20px;margin-top:8px;}
  .detail-body li{font-size:14.5px;color:var(--ink-soft);line-height:1.9;}

  /* ===== STATIC INFO PAGES ===== */
  .info-table{margin-top:6px;}
  .info-table-row{display:flex;justify-content:space-between;gap:16px;padding:10px 0;border-bottom:1px solid var(--line);font-size:14.5px;}
  .info-table-row:last-child{border-bottom:none;}
  .info-table-key{color:var(--ink-soft);font-weight:600;}
  .info-table-value{color:var(--ink);font-weight:700;}

  /* ===== CHAT WIDGET ===== */
  .chat-fab{
    position:fixed;bottom:24px;right:24px;z-index:900;
    width:56px;height:56px;border-radius:50%;
    background:var(--coral);color:#fff;
    display:flex;align-items:center;justify-content:center;
    box-shadow:var(--shadow-lg);
    transition:transform .15s,background .15s;
  }
  .chat-fab:hover{background:var(--coral-dark);transform:scale(1.06);}
  .chat-panel{
    position:fixed;bottom:92px;right:24px;z-index:900;
    width:340px;max-width:calc(100vw - 32px);
    height:480px;max-height:calc(100vh - 140px);
    background:var(--paper);border-radius:16px;
    box-shadow:var(--shadow-lg);border:1px solid var(--line);
    display:flex;flex-direction:column;overflow:hidden;
    animation:slideUp .2s ease;
  }
  .chat-header{
    background:var(--navy);color:#fff;padding:16px 18px;
    display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0;
  }
  .chat-header h4{font-size:14.5px;margin:0;}
  .chat-header p{font-size:11.5px;color:rgba(255,255,255,0.6);margin-top:3px;}
  .chat-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
  .chat-msg{max-width:85%;padding:9px 12px;border-radius:10px;font-size:13px;line-height:1.5;}
  .chat-msg.bot{background:var(--cream);color:var(--ink);align-self:flex-start;border-bottom-left-radius:2px;}
  .chat-msg.user{background:var(--coral);color:#fff;align-self:flex-end;border-bottom-right-radius:2px;}
  .chat-quick-list{display:flex;flex-direction:column;gap:6px;padding:0 14px 10px;flex-shrink:0;max-height:140px;overflow-y:auto;}
  .chat-quick-btn{
    text-align:left;padding:8px 12px;border-radius:8px;
    border:1px solid var(--line);font-size:12.5px;color:var(--ink-soft);
    background:var(--paper);transition:all .15s;
  }
  .chat-quick-btn:hover{border-color:var(--coral);color:var(--coral-text);}
  .chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line);flex-shrink:0;}
  .chat-input-row input{flex:1;border:1.5px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;background:var(--paper);color:var(--ink);}
  .chat-input-row input:focus{outline:none;border-color:var(--accent);}
  .chat-input-row button{
    width:36px;height:36px;border-radius:8px;background:var(--coral);color:#fff;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .detail-actions{display:flex;gap:10px;margin-top:26px;padding-top:22px;border-top:1px solid var(--line);}

  /* ===== POST JOB PAGE ===== */
  .post-layout{display:grid;grid-template-columns:1fr 320px;gap:28px;align-items:start;}
  .post-form-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:32px;}
  .post-form-card h3{font-size:19px;margin-bottom:2px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .tip-card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:22px;position:sticky;top:104px;}
  .tip-card h5{font-size:13px;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-soft);margin-bottom:14px;}
  .tip-item{display:flex;gap:10px;margin-bottom:14px;font-size:13px;color:var(--ink-soft);line-height:1.6;}
  .tip-item svg{color:var(--green);flex-shrink:0;margin-top:1px;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--navy);color:#fff;padding:13px 22px;border-radius:10px;
    font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);
    display:flex;align-items:center;gap:10px;z-index:1200;
    animation:toastIn .2s ease;
  }
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}

  .breadcrumb{font-size:13px;color:var(--ink-mute);margin-bottom:20px;display:flex;gap:6px;align-items:center;}
  .breadcrumb a{color:var(--ink-soft);font-weight:600;}
  .breadcrumb a:hover{color:var(--coral);}

  .page-title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .page-title-row h1{font-size:26px;}
  .result-count{font-size:14px;color:var(--ink-mute);margin-top:4px;}

  /* ===== CV BUILDER ===== */
  .cv-page-layout{max-width:760px;}
  .cv-page-layout h3{font-size:17px;margin-bottom:16px;}
  .chip-input-row{display:flex;gap:8px;}
  .chip-input-row .form-input{flex:1;}
  .cv-chip{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--coral-light);color:var(--coral-text);
    padding:5px 10px;border-radius:999px;font-size:12.5px;font-weight:700;
  }
  .cv-chip button{color:var(--coral-text);display:flex;}
  .cv-chip.cv-chip-static{padding:5px 12px;}
  .cv-entry{border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px;background:var(--cream);}
  .cv-entry-title{font-weight:700;font-size:14.5px;}
  .cv-entry-sub{font-size:12.5px;color:var(--ink-mute);margin:2px 0 8px;}
  .cv-view-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px;flex-wrap:wrap;}

  @media (max-width:900px){
    .container{padding:0 16px;}
    .header-top{flex-wrap:wrap;gap:12px;}
    nav.main-nav{order:3;width:100%;overflow-x:auto;gap:20px;padding-bottom:2px;}
    .hero h1{font-size:30px;}
    .search-panel{grid-template-columns:1fr;}
    .search-divider{display:none;}
    .cat-grid{grid-template-columns:repeat(2,1fr);}
    .job-layout{grid-template-columns:1fr;}
    .filters-box{position:static;}
    .footer-grid{grid-template-columns:1fr 1fr;}
    .post-layout{grid-template-columns:1fr;}
    .cta-band{flex-direction:column;text-align:center;}
    .form-row{grid-template-columns:1fr;}
    .hero-stats{gap:22px;flex-wrap:wrap;}
  }

/* ============ API CLIENT ============ */
// Point this at your deployed backend (see /backend in the project you
// downloaded alongside this file). Defaults to a local dev server.
const API_BASE = (window.JUMPSTART_API_BASE) || 'http://localhost:4000/api';

// localStorage keeps the login session across page refreshes. Wrapped in
// try/catch because some preview/sandbox contexts block storage access —
// in that case we fall back to an in-memory-only session for this tab.
const safeStorage = (() => {
  let memory = {};
  let usable = true;
  try {
    const k = '__jumpstart_test__';
    window.localStorage.setItem(k, '1');
    window.localStorage.removeItem(k);
  } catch (e) { usable = false; }
  return {
    get(key) { try { return usable ? window.localStorage.getItem(key) : memory[key] ?? null; } catch (e) { return memory[key] ?? null; } },
    set(key, val) { try { if (usable) { window.localStorage.setItem(key, val); return; } } catch (e) {} memory[key] = val; },
    remove(key) { try { if (usable) { window.localStorage.removeItem(key); return; } } catch (e) {} delete memory[key]; },
  };
})();

class ApiError extends Error {}

async function apiFetch(path, { method = 'GET', body, token } = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  let res;
  try {
    res = await fetch(API_BASE + path, { method, headers, body: body !== undefined ? JSON.stringify(body) : undefined });
  } catch (networkErr) {
    throw new ApiError('Няма връзка със сървъра. Проверете дали бекендът е стартиран.');
  }
  let data = {};
  try { data = await res.json(); } catch (e) { /* empty body, e.g. some 204s */ }
  if (!res.ok) throw new ApiError(data.error || 'Възникна грешка. Опитайте отново.');
  return data;
}

const api = {
  listJobs: (params = {}) => {
    const qs = new URLSearchParams(Object.entries(params).filter(([,v]) => v !== undefined && v !== '')).toString();
    return apiFetch('/jobs' + (qs ? '?' + qs : '')).then(d => d.jobs);
  },
  createJob: (token, form) => apiFetch('/jobs', { method: 'POST', token, body: form }).then(d => d.job),
  myJobs: (token) => apiFetch('/jobs/mine', { token }).then(d => d.jobs),
  applyToJob: (token, jobId) => apiFetch(`/jobs/${jobId}/apply`, { method: 'POST', token }),
  myApplications: (token) => apiFetch('/applications', { token }).then(d => d.jobIds),
  saveJob: (token, jobId) => apiFetch(`/saved/${jobId}`, { method: 'POST', token }),
  unsaveJob: (token, jobId) => apiFetch(`/saved/${jobId}`, { method: 'DELETE', token }),
  mySavedJobs: (token) => apiFetch('/saved', { token }).then(d => d.jobs),
  register: (payload) => apiFetch('/auth/register', { method: 'POST', body: payload }),
  login: (payload) => apiFetch('/auth/login', { method: 'POST', body: payload }),
  me: (token) => apiFetch('/auth/me', { token }).then(d => d.user),
  getCv: (token) => apiFetch('/cv', { token }).then(d => d.cv),
  saveCv: (token, payload) => apiFetch('/cv', { method: 'PUT', token, body: payload }).then(d => d.cv),
};

// The backend stores raw timestamps; these turn them into the same
// Bulgarian relative-time labels the UI has always shown.
function formatPosted(createdAt) {
  const days = Math.floor((Date.now() - new Date(createdAt).getTime()) / 86400000);
  if (days <= 0) return 'Днес';
  if (days === 1) return 'Вчера';
  return 'Преди ' + days + ' дни';
}
function isRecentlyPosted(createdAt) {
  return (Date.now() - new Date(createdAt).getTime()) < 3 * 86400000;
}

// Salaries are stored in BGN. Bulgaria's euro adoption uses the fixed
// currency-board peg (1 EUR = 1.95583 BGN), not a floating market rate.
const BGN_PER_EUR = 1.95583;
function bgnToEur(bgn) {
  return Math.round(bgn / BGN_PER_EUR);
}
function formatSalaryEur(min, max) {
  return `${bgnToEur(min).toLocaleString('bg-BG')} – ${bgnToEur(max).toLocaleString('bg-BG')} €`;
}
function formatSalaryBgn(min, max) {
  return `${min.toLocaleString('bg-BG')} – ${max.toLocaleString('bg-BG')} лв.`;
}
// Raw job rows from the API carry createdAt; the UI has always displayed
// a Bulgarian relative-time label and a "new" tag instead, so we attach
// those here once, right after fetching, rather than changing every
// component that reads job.posted / job.isNew.
function hydrateJob(job) {
  return { ...job, posted: formatPosted(job.createdAt), isNew: isRecentlyPosted(job.createdAt) };
}
function hydrateJobs(jobs) { return jobs.map(hydrateJob); }

/* ============ SEARCHABLE CITY SELECT ============ */
function CitySelect({options,value,onChange,className,placeholder}){
  const [open,setOpen] = useState(false);
  const [query,setQuery] = useState('');
  const wrapRef = useRef(null);

  useEffect(()=>{
    function onDocDown(e){
      if(wrapRef.current && !wrapRef.current.contains(e.target)){ setOpen(false); setQuery(''); }
    }
    document.addEventListener('mousedown', onDocDown);
    return ()=>document.removeEventListener('mousedown', onDocDown);
  },[]);

  const filtered = useMemo(()=>{
    const q = query.trim().toLowerCase();
    if(!q) return options;
    return options.filter(o=>o.toLowerCase().includes(q));
  },[options,query]);

  const select = (opt) => { onChange(opt); setOpen(false); setQuery(''); };

  const handleKeyDown = (e) => {
    if(e.key==='Enter'){ e.preventDefault(); if(filtered[0]) select(filtered[0]); }
    else if(e.key==='Escape'){ setOpen(false); setQuery(''); }
  };

  return (
    <div className="city-select" ref={wrapRef}>
      <input
        className={className}
        placeholder={placeholder||'Търсете град...'}
        value={open ? query : value}
        onFocus={()=>setQuery('')}
        onClick={()=>setOpen(true)}
        onChange={e=>{setOpen(true);setQuery(e.target.value);}}
        onKeyDown={handleKeyDown}
      />
      {open && (
        <div className="city-select-dropdown">
          {filtered.length===0 ? (
            <div className="city-select-empty">Няма намерени градове</div>
          ) : filtered.map(opt=>(
            <div
              key={opt}
              className={"city-select-option"+(opt===value?' active':'')}
              onClick={()=>select(opt)}
            >{opt}</div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ============ AUTH MODAL ============ */
function AuthModal({mode,onClose,onSwitch,onAuthSuccess}){
  const [role,setRole] = useState('candidate');
  const [name,setName] = useState('');
  const [email,setEmail] = useState('');
  const [password,setPassword] = useState('');
  const [showPass,setShowPass] = useState(false);
  const [errors,setErrors] = useState({});
  const [submitting,setSubmitting] = useState(false);
  const [submitted,setSubmitted] = useState(false);

  const validate = () => {
    const e = {};
    if(mode==='register' && name.trim().length<2) e.name='Моля, въведете вашето име';
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) e.email='Въведете валиден имейл адрес';
    if(password.length<6) e.password='Паролата трябва да е поне 6 символа';
    return e;
  };

  const handleSubmit = async (ev) => {
    ev.preventDefault();
    const e = validate();
    setErrors(e);
    if(Object.keys(e).length>0) return;

    setSubmitting(true);
    try {
      const data = mode==='register'
        ? await api.register({name, email, password, role})
        : await api.login({email, password});
      setSubmitting(false);
      setSubmitted(true);
      setTimeout(()=>{ onAuthSuccess(data); }, 700);
    } catch (err) {
      setSubmitting(false);
      setErrors({general: err.message});
    }
  };

  if(submitted){
    return (
      <div className="modal-overlay" onClick={onClose}>
        <div className="modal-box" onClick={e=>e.stopPropagation()} style={{padding:'10px 0'}}>
          <div className="modal-body">
            <div className="success-box">
              <div className="success-icon"><Icon name="check" size={28}/></div>
              <h3 style={{fontSize:19,marginBottom:6}}>{mode==='register'?'Профилът е създаден!':'Успешен вход!'}</h3>
              <p style={{fontSize:13.5,color:'var(--ink-mute)'}}>Пренасочваме ви...</p>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <div className="modal-title">{mode==='register'?'Създайте профил':'Влезте в профила си'}</div>
            <div className="modal-sub">{mode==='register'?'Присъединете се безплатно за секунди':'Добре дошли отново в JumpStart'}</div>
          </div>
          <button className="modal-close" onClick={onClose} aria-label="Затвори"><Icon name="x" size={18}/></button>
        </div>
        <div className="modal-body">
          {errors.general && (
            <div className="form-err-msg" style={{background:'var(--coral-light)',color:'var(--coral-text)',padding:'10px 12px',borderRadius:8,marginBottom:16,fontSize:13.5}}>
              {errors.general}
            </div>
          )}
          <form onSubmit={handleSubmit} noValidate>
            {mode==='register' && (
              <div className="role-toggle">
                <div className={"role-opt"+(role==='candidate'?' active':'')} onClick={()=>setRole('candidate')} style={{cursor:'pointer'}}>
                  <Icon name="user" size={18}/>
                  <span>Търся работа</span>
                </div>
                <div className={"role-opt"+(role==='employer'?' active':'')} onClick={()=>setRole('employer')} style={{cursor:'pointer'}}>
                  <Icon name="building" size={18}/>
                  <span>Наемам служители</span>
                </div>
              </div>
            )}

            {mode==='register' && (
              <div className="form-group">
                <label>Пълно име</label>
                <input className={"form-input"+(errors.name?' err':'')} placeholder="Име и фамилия" value={name} onChange={e=>setName(e.target.value)}/>
                {errors.name && <div className="form-err-msg">{errors.name}</div>}
              </div>
            )}

            <div className="form-group">
              <label>Имейл адрес</label>
              <input type="email" className={"form-input"+(errors.email?' err':'')} placeholder="ivan.petrov@email.bg" value={email} onChange={e=>setEmail(e.target.value)}/>
              {errors.email && <div className="form-err-msg">{errors.email}</div>}
            </div>

            <div className="form-group">
              <label>Парола</label>
              <div style={{position:'relative'}}>
                <input type={showPass?'text':'password'} className={"form-input"+(errors.password?' err':'')} placeholder="Минимум 6 символа" value={password} onChange={e=>setPassword(e.target.value)} style={{paddingRight:40}}/>
                <button type="button" onClick={()=>setShowPass(!showPass)} style={{position:'absolute',right:10,top:9,color:'var(--ink-mute)'}} aria-label="Покажи паролата">
                  <Icon name={showPass?'eyeOff':'eye'} size={17}/>
                </button>
              </div>
              {errors.password && <div className="form-err-msg">{errors.password}</div>}
              {mode==='register' && !errors.password && <div className="form-hint">Използвайте комбинация от букви и цифри</div>}
            </div>

            <button type="submit" className="btn btn-navy btn-full btn-lg" style={{marginTop:6}} disabled={submitting}>
              {submitting ? 'Момент...' : (mode==='register'?'Създай безплатен профил':'Вход')}
            </button>
          </form>

          <div className="modal-switch">
            {mode==='register' ? (
              <>Вече имате профил? <button onClick={()=>onSwitch('login')}>Влезте тук</button></>
            ) : (
              <>Нямате профил? <button onClick={()=>onSwitch('register')}>Регистрирайте се</button></>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function DashboardPage({token,onOpen,refreshKey}){
  const [myJobs,setMyJobs] = useState([]);
  const [loading,setLoading] = useState(true);
  const [error,setError] = useState('');

  useEffect(()=>{
    let cancelled = false;
    setLoading(true);
    api.myJobs(token).then(jobs=>{
      if(!cancelled){ setMyJobs(hydrateJobs(jobs)); setLoading(false); }
    }).catch(err=>{
      if(!cancelled){ setError(err.message); setLoading(false); }
    });
    return ()=>{ cancelled = true; };
  },[token,refreshKey]);

  return (
    <div className="container section" style={{paddingTop:32}}>
      <div className="breadcrumb"><span>Начало</span><Icon name="chevronRight" size={12}/><span style={{color:'var(--ink)'}}>Моите обяви</span></div>
      <div className="page-title-row"><div><h1>Публикувани от мен обяви</h1><div className="result-count">{myJobs.length} обяви</div></div></div>
      {loading ? (
        <div className="empty-state"><p>Зареждане...</p></div>
      ) : error ? (
        <div className="empty-state"><p>{error}</p></div>
      ) : myJobs.length===0 ? (
        <div className="empty-state">
          <Icon name="fileText" size={38} style={{margin:'0 auto'}}/>
          <h4>Все още нямате публикувани обяви</h4>
          <p>Публикувайте първата си обява, за да достигнете до кандидати.</p>
        </div>
      ) : (
        <div className="job-list">{myJobs.map(j=><JobCard key={j.id} job={j} saved={false} onToggleSave={()=>{}} onOpen={onOpen}/>)}</div>
      )}
    </div>
  );
}

    set(key, [...form[key], v]);

function CvPage({user,token,onOpenAuth}){

  const [mode,setMode] = useState('view');
  const [saving,setSaving] = useState(false);

  useEffect(()=>{
    if(!user || !token){ setLoading(false); return; }
    let cancelled = false;
    setLoading(true);
    api.getCv(token).then(data=>{
      if(cancelled) return;
      setCv(data);
      setMode(data ? 'view' : 'edit');
      setLoading(false);
    }).catch(err=>{
      if(cancelled) return;
      setError(err.message);
      setLoading(false);
    });
    return ()=>{ cancelled = true; };
  },[user,token]);

  const handleSave = async (form) => {
    setSaving(true);
    setError('');
    try {
      const saved = await api.saveCv(token, form);
      setCv(saved);
      setMode('view');
    } catch (err) {
      setError(err.message);
    } finally {
      setSaving(false);
    }
  };

  if(!user){
    return (
      <div className="container section" style={{paddingTop:32}}>

      <div className="breadcrumb"><span>Начало</span><Icon name="chevronRight" size={12}/><span style={{color:'var(--ink)'}}>Моето CV</span></div>

        </div>
      </div>

      {loading ? (
        <div className="empty-state"><p>Зареждане...</p></div>

/* ============ CHAT WIDGET (simple FAQ bot, no external API) ============ */
const FAQ_ENTRIES = [
  {q:'Как да кандидатствам за обява?', a:'Отворете обявата, която ви интересува, и натиснете "Кандидатствай сега". Ако още нямате профил, системата ще ви покани да се регистрирате безплатно.'},
  {q:'Как да запазя обява за по-късно?', a:'Натиснете иконата с флагче в горния десен ъгъл на всяка обява. Запазените обяви ще намерите в секция "Запазени" от менюто.'},
  {q:'Как да създам CV?', a:'От менюто изберете "Моето CV" (вижда се, след като влезете в профила си). Попълвате шаблона веднъж и той остава запазен, докато не решите да го редактирате.'},
  {q:'Как да публикувам обява?', a:'Само работодателски профили могат да публикуват обяви. Регистрирайте се като "Наемам служители", после натиснете "Публикувай обява".'},
  {q:'В каква валута са заплатите?', a:'Обявите показват заплатата първо в евро, после в лева — по фиксирания курс за България (1 EUR = 1.95583 лв.).'},
  {q:'Как да сменя темата на сайта?', a:'Иконата със слънце/луна горе в менюто превключва между светла и тъмна тема. Изборът се запазва автоматично.'},
  {q:'Как да се свържа с екипа?', a:'Пишете ни на jumpstart.official1@gmail.com — вижте страница "Контакти" за повече информация.'},
];

const FAQ_STOPWORDS = new Set(['как','да','за','си','ли','са','от','на','със','мен','ме','ви','му','и','е','ще','това']);

function faqTokenize(text){
  return text.toLowerCase()
    .replace(/[^a-zа-я0-9\s]/gi, ' ')
    .split(/\s+/)
    .filter(w => w.length > 3 && !FAQ_STOPWORDS.has(w));
}

function findFaqMatch(input){
  const words = faqTokenize(input);
  if(words.length===0) return null;
  let best=null, bestScore=0;
  FAQ_ENTRIES.forEach(entry=>{
    const qWords = faqTokenize(entry.q);
    const score = words.filter(w=>qWords.some(qw=>qw===w || qw.includes(w) || w.includes(qw))).length;
    if(score>bestScore){ bestScore=score; best=entry; }
  });
  return bestScore>0 ? best : null;
}

function ChatWidget(){
  const [open,setOpen] = useState(false);
  const [messages,setMessages] = useState([
    {from:'bot', text:'Здравейте! Аз съм помощникът на JumpStart. Изберете въпрос по-долу или си напишете своя.'},
  ]);
  const [input,setInput] = useState('');
  const bodyRef = useRef(null);

  useEffect(()=>{
    if(bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  },[messages,open]);

  const ask = (entry) => {
    setMessages(m=>[...m, {from:'user', text:entry.q}, {from:'bot', text:entry.a}]);
  };

  const handleSend = (e) => {
    e.preventDefault();
    const text = input.trim();
    if(!text) return;
    const match = findFaqMatch(text);
    setMessages(m=>[...m,
      {from:'user', text},
      {from:'bot', text: match ? match.a : 'Не съм сигурен, че разбрах правилно. Опитайте с някой от готовите въпроси по-долу, или пишете на jumpstart.official1@gmail.com.'},
    ]);
    setInput('');
  };

  return (
    <>
      {open && (
        <div className="chat-panel">
          <div className="chat-header">
            <div>
              <h4>JumpStart Помощник</h4>
              <p>Готови отговори на чести въпроси</p>

              <div key={i} className={"chat-msg "+m.from}>{m.text}</div>
            ))}
          </div>
          <div className="chat-quick-list">
            {FAQ_ENTRIES.map(entry=>(
              <button key={entry.q} className="chat-quick-btn" onClick={()=>ask(entry)}>{entry.q}</button>
            ))}

            <button type="submit" aria-label="Изпрати"><Icon name="arrowRight" size={16}/></button>
          </form>
        </div>
      )}
      <button className="chat-fab" onClick={()=>setOpen(o=>!o)} aria-label={open?'Затвори чата':'Отвори чата'}>
        <Icon name={open?'x':'chatBubble'} size={24}/>

    </>
  );
}

function App(){
  const [jobs,setJobs] = useState([]);
  const [jobsLoading,setJobsLoading] = useState(true);
  const [jobsError,setJobsError] = useState('');
  const [page,setPage] = useState('home');
  const [user,setUser] = useState(null);
  const [token,setToken] = useState(null);
  const [authMode,setAuthMode] = useState(null);
  const [selectedJob,setSelectedJob] = useState(null);
  const [savedJobs,setSavedJobs] = useState([]);
  const [applied,setApplied] = useState([]);
  const [toast,setToast] = useState(null);
  const [searchKw,setSearchKw] = useState('');
  const [searchCity,setSearchCity] = useState('Всички градове');
  const [dashboardRefreshKey,setDashboardRefreshKey] = useState(0);
  const [theme,setTheme] = useState(()=>{
    const saved = safeStorage.get('jumpstart_theme');
    if(saved==='dark' || saved==='light') return saved;
    return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  });

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme', theme);
    safeStorage.set('jumpstart_theme', theme);
  },[theme]);

  const toggleTheme = () => setTheme(t=>t==='dark'?'light':'dark');

  const savedIds = useMemo(()=>savedJobs.map(j=>j.id),[savedJobs]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(()=>setToast(null),2600);
  };

  // Load the public job list once on mount.
  useEffect(()=>{
    let cancelled = false;
    api.listJobs().then(list=>{
      if(!cancelled){ setJobs(hydrateJobs(list)); setJobsLoading(false); }
    }).catch(err=>{
      if(!cancelled){ setJobsError(err.message); setJobsLoading(false); }
    });
    return ()=>{ cancelled = true; };
  },[]);

  // Restore a logged-in session from a saved token (e.g. after a page refresh).
  useEffect(()=>{
    const saved = safeStorage.get('jumpstart_token');
    if(!saved) return;
    let cancelled = false;
    api.me(saved).then(u=>{
      if(cancelled) return;
      setUser(u);
      setToken(saved);
      return refreshUserData(saved);
    }).catch(()=>{
      safeStorage.remove('jumpstart_token');
    });
    return ()=>{ cancelled = true; };
  },[]);

  // Pulls the logged-in user's applications + saved jobs from the server.
  const refreshUserData = async (tok) => {
    try {
      const [appliedIds, saved] = await Promise.all([api.myApplications(tok), api.mySavedJobs(tok)]);
      setApplied(appliedIds);
      setSavedJobs(hydrateJobs(saved));
    } catch (err) {
      // Non-fatal: user stays logged in even if this background sync fails.
      console.error('Failed to refresh user data:', err);
    }
  };

  const handleSearch = (kw,city) => {
    setSearchKw(kw);
    setSearchCity(city);
    setPage('jobs');
    window.scrollTo({top:0,behavior:'smooth'});
  };

  const handleCategorySelect = (catId) => {
    setSearchKw('');
    setSearchCity('Всички градове');
    setPage('jobs');
  };

  const toggleSave = async (id) => {
    if(!user || !token){ setAuthMode('register'); return; }
    const isSaved = savedIds.includes(id);
    try {
      if(isSaved) await api.unsaveJob(token, id);
      else await api.saveJob(token, id);
      const fresh = await api.mySavedJobs(token);
      setSavedJobs(hydrateJobs(fresh));
    } catch (err) {
      showToast(err.message);
    }
  };

  const handleApply = async (id) => {
    if(!user || !token){ setAuthMode('register'); return; }
    try {
      await api.applyToJob(token, id);
      setApplied(prev=>prev.includes(id)?prev:[...prev,id]);
      showToast('Кандидатурата ви беше изпратена успешно!');
    } catch (err) {
      showToast(err.message);
    } finally {
      setSelectedJob(null);
    }
  };

  const handleAuthSuccess = (data) => {
    setUser(data.user);
    setToken(data.token);
    safeStorage.set('jumpstart_token', data.token);
    setAuthMode(null);
    showToast(`Добре дошли, ${data.user.name.split(' ')[0]}!`);
    refreshUserData(data.token);
  };

  const handleLogout = () => {
    setUser(null);
    setToken(null);
    setApplied([]);
    setSavedJobs([]);
    safeStorage.remove('jumpstart_token');
    showToast('Излязохте от профила си.');
    setPage('home');
  };

  const handlePublishJob = async (form) => {
    const job = await api.createJob(token, form);
    setJobs(prev=>[hydrateJob(job), ...prev]);
    setDashboardRefreshKey(k=>k+1);
    showToast('Обявата е публикувана успешно!');
  };

  return (
    <div>
      <Header
        user={user}
        theme={theme}
        onToggleTheme={toggleTheme}
        onOpenAuth={setAuthMode}
        onLogout={handleLogout}
        onGoHome={()=>setPage('home')}
        onGoPost={()=>setPage('post')}
        onGoJobs={()=>{setSearchKw('');setSearchCity('Всички градове');setPage('jobs');}}
        onGoSaved={()=>setPage('saved')}
        onGoDashboard={()=>setPage('dashboard')}
        onGoCv={()=>setPage('cv')}
      />

      {page==='home' && (
        <>
          <Hero onSearch={handleSearch}/>
          <Categories onSelect={handleCategorySelect}/>
          <div className="employers-strip">
            <div className="container">
              <div className="strip-label">На нас се доверяват водещи компании в България</div>
              <div className="logo-strip">
                {COMPANIES.slice(0,6).map(c=><span key={c.name} className="strip-logo">{c.name}</span>)}
              </div>
            </div>
          </div>
          <section className="section">
            <div className="container">
              <div className="section-head">
                <h2>Най-нови обяви</h2>
                <a href="#" className="see-all" onClick={(e)=>{e.preventDefault();setPage('jobs');}}>Виж всички<Icon name="chevronRight" size={14}/></a>
              </div>
              {jobsLoading ? (
                <p style={{color:'var(--ink-mute)'}}>Зареждане на обяви...</p>
              ) : jobsError ? (
                <p style={{color:'var(--coral-text)'}}>{jobsError}</p>
              ) : (
                <div className="job-list">
                  {jobs.slice(0,6).map(j=>(
                    <JobCard key={j.id} job={j} saved={savedIds.includes(j.id)} onToggleSave={toggleSave} onOpen={setSelectedJob}/>
                  ))}
                </div>
              )}
            </div>
          </section>
          <div className="container" style={{paddingBottom:60}}>
            <div className="cta-band">
              <div>
                <h3>Наемате ли служители в момента?</h3>
                <p>Публикувайте обява безплатно и достигнете до хиляди активни кандидати още днес.</p>

          </div>
        </>
      )}

      {page==='jobs' && (
        <JobsPage jobs={jobs} savedIds={savedIds} onToggleSave={toggleSave} onOpen={setSelectedJob} initialKw={searchKw} initialCity={searchCity} loading={jobsLoading}/>
      )}

      {page==='post' && (
        <PostJobPage user={user} onOpenAuth={setAuthMode} onPublish={handlePublishJob}/>
      )}

      {page==='saved' && (
        <SavedJobsPage savedJobs={savedJobs} onToggleSave={toggleSave} onOpen={setSelectedJob}/>
      )}

      {page==='dashboard' && (
        <DashboardPage token={token} onOpen={setSelectedJob} refreshKey={dashboardRefreshKey}/>
      )}

      {page==='cv' && (
        <CvPage user={user} token={token} onOpenAuth={setAuthMode}/>
      )}

      {STATIC_PAGES[page] && (
        <StaticPage data={STATIC_PAGES[page]}/>
      )}

      <Footer
        onGoCv={()=>setPage('cv')}
        onGoPost={()=>setPage('post')}
        onGoJobs={()=>{setSearchKw('');setSearchCity('Всички градове');setPage('jobs');}}
        onGoStatic={(key)=>{setPage(key);window.scrollTo({top:0,behavior:'smooth'});}}
      />

      <ChatWidget/>

      {selectedJob && (
        <JobDetailModal
          job={selectedJob}
          onClose={()=>setSelectedJob(null)}
          user={user}
          onOpenAuth={(m)=>{setSelectedJob(null);setAuthMode(m);}}
          onApplied={handleApply}
          applied={applied}
        />
      )}

      {authMode && (
        <AuthModal
          mode={authMode}
          onClose={()=>setAuthMode(null)}
          onSwitch={setAuthMode}
          onAuthSuccess={handleAuthSuccess}
        />
      )}

      {toast && (
        <div className="toast"><Icon name="checkCircle" size={16}/>{toast}</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
